version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: ./Dockerfile
    expose:
      - "3000"
    environment:
      RAILS_ENV: production
      RACK_ENV: production
      PORT: 3000
      RAILS_LOG_TO_STDOUT: "true"
      RAILS_SERVE_STATIC_FILES: "true"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/up"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    volumes:
      - truek_api_storage:/app/storage

volumes:
  truek_api_storage:

# Metadata for Coolify (ignored by Docker Compose due to x- prefix)
x-coolify:
  name: truek-api
  description: Truek API - Backend for free object exchange platform
  domains:
    - api.truek.xyz
  ssl:
    enabled: true
    provider: letsencrypt
    force_https: true
  deployment:
    strategy: rolling
    max_surge: 1
    max_unavailable: 0
  resources:
    limits:
      memory: 1024M
      cpu: "1.0"
    reservations:
      memory: 512M
      cpu: "0.5"
